<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>星の命式 ── Mobile Preview</title>
<style>
  :root {
    --bg: #0d1018;
    --ink: #ebe3d1;
    --ink-2: #a8a08c;
    --ink-3: #6b6557;
    --rule: rgba(235,227,209,0.14);
    --seal: #a23b30;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Shippori Mincho','Noto Serif JP', serif; min-height: 100vh; }

  .stage {
    min-height: 100vh;
    padding: 80px 40px 60px;
    display: flex; flex-direction: column; align-items: center; gap: 56px;
  }

  .header {
    text-align: center;
    max-width: 720px;
  }
  .header .eyebrow {
    font-size: 11px; letter-spacing: 0.5em; color: var(--ink-3);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    margin-bottom: 18px;
  }
  .header h1 {
    margin: 0 0 14px;
    font-size: clamp(26px, 3.4vw, 38px);
    letter-spacing: 0.18em; font-weight: 500;
    line-height: 1.4;
    text-wrap: balance;
  }
  .header h1 .ko { font-size: 0.6em; opacity: 0.6; padding: 0 0.2em; }
  .header p {
    margin: 0; color: var(--ink-2); font-size: 13px; line-height: 1.9;
    letter-spacing: 0.12em;
  }

  .row {
    display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap;
    justify-content: center;
  }

  .device-cell {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .device-label {
    font-size: 11px; letter-spacing: 0.4em; color: var(--ink-2);
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; gap: 14px;
  }
  .device-label .num { color: var(--seal); }
  .device-label .div { width: 32px; height: 1px; background: var(--rule); }

  /* iPhone 15 Pro frame: 390 × 844 viewport */
  .device {
    --w: 390px;
    --h: 844px;
    width: calc(var(--w) + 28px);
    height: calc(var(--h) + 28px);
    border-radius: 56px;
    padding: 14px;
    background: linear-gradient(160deg, #2a2a30 0%, #0e0e12 50%, #2a2a30 100%);
    box-shadow:
      0 60px 120px -20px rgba(0,0,0,0.7),
      0 0 0 1px rgba(255,255,255,0.06) inset,
      0 0 0 2px rgba(0,0,0,0.5);
    position: relative;
  }
  .device::before {
    /* outer rim highlight */
    content: '';
    position: absolute; inset: 4px; border-radius: 52px;
    background: linear-gradient(160deg, rgba(255,255,255,0.05), transparent 30%, transparent 70%, rgba(255,255,255,0.05));
    pointer-events: none;
  }
  .screen {
    position: relative;
    width: var(--w); height: var(--h);
    border-radius: 44px;
    overflow: hidden;
    background: #000;
  }
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 36px; border-radius: 22px;
    background: #000;
    z-index: 10;
  }
  .home {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 99px;
    background: rgba(255,255,255,0.7);
    z-index: 10; pointer-events: none;
  }
  .screen iframe {
    width: 100%; height: 100%;
    border: 0;
    display: block;
    background: var(--bg);
  }

  .footer {
    margin-top: 16px;
    text-align: center;
    color: var(--ink-3);
    font-size: 11px; letter-spacing: 0.3em;
    font-family: 'JetBrains Mono', monospace;
  }
  .footer a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 2px;
    margin-left: 12px;
  }

  @media (max-width: 920px) {
    .stage { padding: 32px 16px 48px; gap: 32px; }
    .row { gap: 32px; }
    .device { transform: scale(0.78); transform-origin: top center; margin-bottom: -180px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Noto+Serif+JP:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<main class="stage">
  <div class="header">
    <div class="eyebrow">MOBILE · PREVIEW · iPhone 15 Pro · 390 × 844</div>
    <h1>星<span class="ko">の</span>命式 ── 移動端確認</h1>
    <p>左：序章 Hero ／ 右：鑑定の儀。Tap and scroll inside each frame.</p>
  </div>

  <div class="row">
    <div class="device-cell">
      <div class="device-label">
        <span class="num">壹</span><span class="div"></span><span>序章 / HERO</span>
      </div>
      <div class="device">
        <div class="screen">
          <div class="island"></div>
          <iframe src="index.html" title="Hero"></iframe>
          <div class="home"></div>
        </div>
      </div>
    </div>

    <div class="device-cell">
      <div class="device-label">
        <span class="num">貳</span><span class="div"></span><span>鑑定の儀 / RITE</span>
      </div>
      <div class="device">
        <div class="screen">
          <div class="island"></div>
          <iframe id="rite" src="index.html" title="Rite"></iframe>
          <div class="home"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>HOSHI · NO · MEISHIKI / MOBILE PREVIEW</span>
    <a href="index.html">← デスクトップ版へ</a>
  </div>
</main>

<script>
  // Auto-navigate the second frame to the rite page once loaded.
  const rite = document.getElementById('rite');
  rite.addEventListener('load', () => {
    try {
      const doc = rite.contentDocument;
      // wait a tick for React mount, then click the second nav button (鑑定の儀)
      const tryClick = (n = 0) => {
        const btns = doc.querySelectorAll('.chrome nav button');
        if (btns && btns.length >= 2) {
          btns[1].click();
        } else if (n < 30) {
          setTimeout(() => tryClick(n + 1), 100);
        }
      };
      tryClick();
    } catch (e) { /* same-origin only */ }
  }, { once: true });
</script>
</body>
</html>
