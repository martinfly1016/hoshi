<!doctype html>
<html lang="ja" data-theme="tsukiyo">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>四柱推命 無料鑑定 | 星の命式</title>
<meta name="description" content="生年月日、出生時間、出生地から四柱推命の命式を作成し、日主・五行バランス・通変星をわかりやすく表示します。" />
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1018;
    --paper: #171c2a;
    --paper-2: #202636;
    --ink: #ebe3d1;
    --ink-2: #b6ad99;
    --ink-3: #7e7564;
    --rule: rgba(235, 227, 209, 0.16);
    --rule-strong: rgba(235, 227, 209, 0.28);
    --seal: #a23b30;
    --seal-deep: #6e2820;
    --gold: #b89968;
    --accent: #8fa7cf;
    --good: #87b894;
    --warn: #d5ae71;
    --font-display: "Hiragino Mincho ProN", "Yu Mincho", "Songti SC", serif;
    --font-body: "Hiragino Sans", "Yu Gothic", "PingFang SC", sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 18% 8%, rgba(184, 153, 104, 0.14), transparent 30%),
      radial-gradient(circle at 88% 18%, rgba(100, 128, 168, 0.14), transparent 34%),
      var(--bg);
    color: var(--ink);
    font: 14px/1.8 var(--font-body);
    letter-spacing: 0;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.07;
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at center, #000, transparent 78%);
  }

  a {
    color: var(--accent);
    text-decoration: none;
  }

  h1,
  h2,
  h3,
  p {
    margin: 0;
  }

  button,
  input,
  select {
    font: inherit;
  }

  .shell {
    width: min(1180px, calc(100vw - 36px));
    margin: 0 auto;
    padding: 28px 0 72px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 56px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    color: var(--ink);
    font-family: var(--font-display);
    letter-spacing: 0.14em;
  }

  .seal {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border: 2px solid var(--seal);
    color: var(--seal);
    box-shadow: 0 2px 0 var(--seal-deep);
    transform: rotate(-7deg);
    font-family: var(--font-display);
    line-height: 1;
  }

  .nav {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    color: var(--ink-2);
    font-size: 12px;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 0.86fr) minmax(380px, 1.14fr);
    gap: 48px;
    align-items: start;
  }

  .eyebrow {
    color: var(--gold);
    font: 11px/1.4 var(--font-mono);
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }

  .hero h1 {
    margin-top: 18px;
    font-family: var(--font-display);
    font-size: clamp(42px, 6.2vw, 84px);
    line-height: 1.08;
    letter-spacing: 0.08em;
  }

  .lead {
    max-width: 620px;
    margin-top: 22px;
    color: var(--ink-2);
    font-size: 15px;
  }

  .form-panel {
    border: 1px solid var(--rule-strong);
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--rule);
  }

  .panel-head h2 {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 0.1em;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    padding: 20px;
  }

  .field {
    display: grid;
    gap: 8px;
  }

  .field.full {
    grid-column: 1 / -1;
  }

  label {
    color: var(--ink-2);
    font-size: 13px;
  }

  .hint {
    color: var(--ink-3);
    font-size: 12px;
  }

  input,
  select {
    width: 100%;
    min-height: 44px;
    padding: 0 12px;
    border: 1px solid var(--rule-strong);
    border-radius: 0;
    background: rgba(255, 255, 255, 0.04);
    color: var(--ink);
    font-size: 16px;
  }

  select option {
    background: #151a26;
    color: var(--ink);
  }

  input:focus,
  select:focus {
    outline: 1px solid var(--gold);
    outline-offset: 2px;
  }

  .checkline {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 44px;
  }

  .checkline input {
    width: 18px;
    min-height: 18px;
    accent-color: var(--seal);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    grid-column: 1 / -1;
    padding-top: 4px;
  }

  .primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    min-width: 190px;
    min-height: 46px;
    padding: 0 22px;
    border: 1px solid var(--seal);
    border-radius: 0;
    background: var(--seal);
    color: #fff4ec;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    min-height: 42px;
    padding: 0 14px;
    border: 1px solid var(--rule-strong);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }

  .status {
    color: var(--ink-3);
    font-size: 12px;
  }

  .results {
    display: grid;
    gap: 26px;
    margin-top: 48px;
  }

  .section {
    border-top: 1px solid var(--rule);
    padding-top: 26px;
  }

  .section-title {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title h2 {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 0.1em;
  }

  .summary {
    display: grid;
    grid-template-columns: minmax(280px, 0.76fr) minmax(0, 1fr);
    gap: 24px;
    align-items: stretch;
  }

  .summary-main,
  .summary-side {
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.035);
    padding: 22px;
  }

  .pillar-line {
    margin-top: 10px;
    font-family: var(--font-display);
    font-size: clamp(30px, 5vw, 56px);
    line-height: 1.2;
    letter-spacing: 0.08em;
  }

  .summary-text {
    margin-top: 14px;
    color: var(--ink-2);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid var(--rule);
    color: var(--ink-2);
    font-size: 12px;
  }

  .element-bars {
    display: grid;
    gap: 10px;
  }

  .element-row {
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) 24px;
    gap: 10px;
    align-items: center;
    color: var(--ink-2);
  }

  .bar {
    height: 8px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  .bar span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--accent));
  }

  .pillar-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .pillar {
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.035);
    padding: 16px;
    min-height: 170px;
  }

  .pillar-name {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--ink-3);
    font-size: 12px;
  }

  .pillar-chars {
    margin-top: 10px;
    font-family: var(--font-display);
    font-size: 44px;
    line-height: 1;
    letter-spacing: 0.08em;
  }

  .pillar-meta {
    margin-top: 12px;
    color: var(--ink-2);
    font-size: 13px;
  }

  .table-wrap {
    width: 100%;
    overflow-x: auto;
    border: 1px solid var(--rule);
  }

  table {
    width: 100%;
    min-width: 860px;
    border-collapse: collapse;
  }

  th,
  td {
    padding: 11px 12px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    text-align: left;
    vertical-align: top;
  }

  th {
    color: var(--ink);
    background: rgba(255, 255, 255, 0.05);
    font-weight: 600;
    white-space: nowrap;
  }

  td {
    color: var(--ink-2);
  }

  tr:last-child td {
    border-bottom: 0;
  }

  th:last-child,
  td:last-child {
    border-right: 0;
  }

  .notice-list {
    display: grid;
    gap: 8px;
  }

  .notice {
    border-left: 3px solid var(--warn);
    padding: 8px 12px;
    background: rgba(213, 174, 113, 0.1);
    color: var(--ink-2);
  }

  .next-links {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .next-link {
    min-height: 96px;
    border: 1px solid var(--rule);
    padding: 16px;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.03);
  }

  .next-link span {
    display: block;
    margin-top: 6px;
    color: var(--ink-3);
    font-size: 12px;
  }

  .error {
    border: 1px solid rgba(162, 59, 48, 0.6);
    border-left: 4px solid var(--seal);
    padding: 16px;
    background: rgba(162, 59, 48, 0.1);
    color: #ffd6cc;
  }

  @media (max-width: 980px) {
    .hero,
    .summary {
      grid-template-columns: 1fr;
    }

    .pillar-grid,
    .next-links {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 640px) {
    .shell {
      width: min(100vw - 24px, 1180px);
      padding-top: 18px;
    }

    .topbar,
    .panel-head,
    .section-title {
      align-items: flex-start;
      flex-direction: column;
    }

    .hero {
      gap: 28px;
    }

    .form-grid,
    .pillar-grid,
    .next-links {
      grid-template-columns: 1fr;
    }

    .summary-main,
    .summary-side,
    .pillar {
      padding: 16px;
    }

    .primary,
    .secondary {
      width: 100%;
    }
  }
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <a class="brand" href="../../index.html" aria-label="星の命式">
      <span class="seal">命</span>
      <span>星 の 命 式</span>
    </a>
    <nav class="nav" aria-label="主導航">
      <a href="../../index.html">首頁</a>
      <a href="../../calculator.html">純工具</a>
      <a href="../../calculation-lab.html">検証台</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <div class="eyebrow">SHICHUSUIMEI · FREE READING</div>
      <h1>四柱推命<br />無料鑑定</h1>
      <p class="lead">生年月日と出生時間から命式を作成し、日主・五行バランス・通変星を読み解きます。結果はこの端末上で計算され、サーバーへ保存されません。</p>
    </div>

    <form id="birth-form" class="form-panel">
      <div class="panel-head">
        <h2>鑑定の入力</h2>
        <span class="eyebrow">壹 / INPUT</span>
      </div>
      <div class="form-grid">
        <div class="field">
          <label for="birth-date">生年月日</label>
          <input id="birth-date" type="date" required value="1990-06-15" />
        </div>

        <div class="field">
          <label for="birth-time">出生時間</label>
          <input id="birth-time" type="time" step="60" value="10:30" />
        </div>

        <div class="field">
          <label for="location">出生地</label>
          <select id="location"></select>
          <p class="hint">真太陽時を使う場合は都市レベルの地点を選んでください。</p>
        </div>

        <div class="field">
          <label>時間の扱い</label>
          <div class="checkline">
            <input id="time-known" type="checkbox" checked />
            <label for="time-known">出生時間がわかる</label>
          </div>
        </div>

        <div class="field">
          <label for="time-mode">計算モード</label>
          <select id="time-mode">
            <option value="standard_time">標準時間で計算</option>
            <option value="true_solar_time">真太陽時で精密計算</option>
          </select>
        </div>

        <div class="field">
          <label for="late-zi-mode">23:00 子時の扱い</label>
          <select id="late-zi-mode">
            <option value="same_day">晚子時として当日扱い</option>
            <option value="next_day">23:00 で翌日扱い</option>
          </select>
        </div>

        <div class="actions">
          <button class="primary" type="submit">命式を作成</button>
          <button id="copy-json" class="secondary" type="button">JSON をコピー</button>
          <span id="status" class="status" aria-live="polite"></span>
        </div>
      </div>
    </form>
  </section>

  <section id="result" class="results" aria-live="polite"></section>
</main>

<script type="module" src="./page.js?v=free-20260511-1"></script>
</body>
</html>
