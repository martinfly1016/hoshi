<!doctype html>
<html lang="ja" data-theme="tsukiyo">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>四柱推命 無料鑑定 | 星の命式</title>
<meta name="description" content="生年月日、出生時間、出生地から四柱推命の命式を作成し、日主・五行バランス・通変星をわかりやすく表示します。" />
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1018;
    --paper: #171c2a;
    --paper-2: #202636;
    --ink: #ebe3d1;
    --ink-2: #b6ad99;
    --ink-3: #7e7564;
    --rule: rgba(235, 227, 209, 0.16);
    --rule-strong: rgba(235, 227, 209, 0.28);
    --seal: #a23b30;
    --seal-deep: #6e2820;
    --gold: #b89968;
    --accent: #8fa7cf;
    --good: #87b894;
    --warn: #d5ae71;
    --font-display: "Hiragino Mincho ProN", "Yu Mincho", "Songti SC", serif;
    --font-body: "Hiragino Sans", "Yu Gothic", "PingFang SC", sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 18% 8%, rgba(184, 153, 104, 0.14), transparent 30%),
      radial-gradient(circle at 88% 18%, rgba(100, 128, 168, 0.14), transparent 34%),
      var(--bg);
    color: var(--ink);
    font: 14px/1.8 var(--font-body);
    letter-spacing: 0;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.07;
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at center, #000, transparent 78%);
  }

  a {
    color: var(--accent);
    text-decoration: none;
  }

  h1,
  h2,
  h3,
  p {
    margin: 0;
  }

  button,
  input,
  select {
    font: inherit;
  }

  .shell {
    width: min(1180px, calc(100vw - 36px));
    margin: 0 auto;
    padding: 28px 0 72px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 56px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    color: var(--ink);
    font-family: var(--font-display);
    letter-spacing: 0.14em;
  }

  .seal {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    border: 2px solid var(--seal);
    color: var(--seal);
    box-shadow: 0 2px 0 var(--seal-deep);
    transform: rotate(-7deg);
    font-family: var(--font-display);
    line-height: 1;
  }

  .nav {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    color: var(--ink-2);
    font-size: 12px;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 0.86fr) minmax(380px, 1.14fr);
    gap: 48px;
    align-items: start;
  }

  .eyebrow {
    color: var(--gold);
    font: 11px/1.4 var(--font-mono);
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }

  .hero h1 {
    margin-top: 18px;
    font-family: var(--font-display);
    font-size: clamp(42px, 6.2vw, 84px);
    line-height: 1.08;
    letter-spacing: 0.08em;
  }

  .lead {
    max-width: 620px;
    margin-top: 22px;
    color: var(--ink-2);
    font-size: 15px;
  }

  .form-panel {
    border: 1px solid var(--rule-strong);
    background: color-mix(in srgb, var(--paper) 92%, transparent);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--rule);
  }

  .panel-head h2 {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 0.1em;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    padding: 20px;
  }

  .field {
    display: grid;
    gap: 8px;
  }

  .field.full {
    grid-column: 1 / -1;
  }

  label {
    color: var(--ink-2);
    font-size: 13px;
  }

  .field-heading {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-height: 23px;
  }

  .field-heading label {
    margin: 0;
  }

  .field-note {
    color: var(--ink-3);
    font-size: 12px;
    line-height: 1.4;
  }

  .hint {
    color: var(--ink-3);
    font-size: 12px;
  }

  input,
  select {
    width: 100%;
    min-height: 44px;
    padding: 0 12px;
    border: 1px solid var(--rule-strong);
    border-radius: 0;
    background: rgba(255, 255, 255, 0.04);
    color: var(--ink);
    font-size: 16px;
  }

  select option {
    background: #151a26;
    color: var(--ink);
  }

  input:focus,
  select:focus {
    outline: 1px solid var(--gold);
    outline-offset: 2px;
  }

  .field.is-time-abandoned label {
    color: var(--ink-3);
  }

  .field.is-time-abandoned input {
    border-style: dashed;
    background:
      repeating-linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.035) 0,
        rgba(255, 255, 255, 0.035) 8px,
        rgba(255, 255, 255, 0.015) 8px,
        rgba(255, 255, 255, 0.015) 16px
      );
    color: var(--ink-3);
    cursor: not-allowed;
    opacity: 0.58;
    text-decoration: line-through;
  }

  .field-note.time-note {
    display: none;
  }

  .field.is-time-abandoned .field-note.time-note {
    display: inline;
    color: var(--warn);
  }

  .checkline {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 44px;
  }

  .checkline input {
    width: 18px;
    min-height: 18px;
    accent-color: var(--seal);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    grid-column: 1 / -1;
    padding-top: 4px;
  }

  .primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    min-width: 190px;
    min-height: 46px;
    padding: 0 22px;
    border: 1px solid var(--seal);
    border-radius: 0;
    background: var(--seal);
    color: #fff4ec;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .primary:disabled,
  .secondary:disabled {
    cursor: wait;
    opacity: 0.62;
  }

  .secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    min-height: 42px;
    padding: 0 14px;
    border: 1px solid var(--rule-strong);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
  }

  .status {
    color: var(--ink-3);
    font-size: 12px;
  }

  .results {
    display: grid;
    gap: 26px;
    margin-top: 48px;
  }

  .results.is-entering .section {
    animation: revealResult 620ms ease both;
  }

  .empty-state,
  .casting {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--rule);
    background:
      linear-gradient(135deg, rgba(184, 153, 104, 0.1), transparent 34%),
      rgba(255, 255, 255, 0.03);
    padding: 28px;
  }

  .empty-state h2,
  .casting h2 {
    margin-top: 8px;
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 0.1em;
  }

  .empty-state p,
  .casting p {
    margin-top: 10px;
    color: var(--ink-2);
  }

  .casting {
    min-height: 260px;
    display: grid;
    place-items: center;
    text-align: center;
  }

  .casting::after {
    content: "";
    position: absolute;
    inset: 16px;
    border: 1px solid rgba(184, 153, 104, 0.18);
    pointer-events: none;
  }

  .casting-mark {
    position: relative;
    width: 96px;
    height: 96px;
    margin: 0 auto 18px;
    border: 1px solid rgba(184, 153, 104, 0.32);
    border-radius: 999px;
  }

  .casting-mark::before,
  .casting-mark::after {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(143, 167, 207, 0.28);
    border-radius: 999px;
  }

  .casting-mark::after {
    inset: 30px;
    background: var(--gold);
    box-shadow: 0 0 26px rgba(184, 153, 104, 0.42);
  }

  .casting-orbit {
    position: absolute;
    inset: -1px;
    border-radius: 999px;
    animation: rotateOracle 1.8s linear infinite;
  }

  .casting-orbit::before {
    content: "";
    position: absolute;
    top: -4px;
    left: 50%;
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--seal);
    box-shadow: 0 0 18px rgba(162, 59, 48, 0.8);
  }

  .result-stale {
    opacity: 0.58;
    filter: saturate(0.78);
  }

  .section {
    border-top: 1px solid var(--rule);
    padding-top: 26px;
  }

  .section-title {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title h2 {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 0.1em;
  }

  .section-copy {
    max-width: 760px;
    margin: -2px 0 18px;
    color: var(--ink-2);
  }

  .summary {
    display: grid;
    grid-template-columns: minmax(280px, 0.76fr) minmax(0, 1fr);
    gap: 24px;
    align-items: stretch;
  }

  .summary-main,
  .summary-side {
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.035);
    padding: 22px;
  }

  .summary-side.compact {
    max-width: 520px;
  }

  .card-title {
    margin-top: 10px;
    font-family: var(--font-display);
    font-size: 24px;
    letter-spacing: 0.08em;
  }

  .value-display {
    margin-top: 10px;
    font-family: var(--font-display);
    font-size: clamp(44px, 7vw, 76px);
    line-height: 1.05;
    letter-spacing: 0.08em;
  }

  .lead-copy {
    margin-top: 10px;
    color: var(--ink-2);
  }

  .fact-list {
    display: grid;
    gap: 0;
  }

  .fact-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding: 11px 0;
    border-bottom: 1px solid var(--rule);
    color: var(--ink-2);
  }

  .fact-row:last-child {
    border-bottom: 0;
  }

  .fact-row span {
    color: var(--ink-3);
    font-size: 12px;
  }

  .fact-row strong {
    color: var(--ink);
    text-align: right;
  }

  .pillar-line {
    margin-top: 10px;
    font-family: var(--font-display);
    font-size: clamp(30px, 5vw, 56px);
    line-height: 1.2;
    letter-spacing: 0.08em;
  }

  .summary-text {
    margin-top: 14px;
    color: var(--ink-2);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid var(--rule);
    color: var(--ink-2);
    font-size: 12px;
  }

  .element-bars {
    display: grid;
    gap: 10px;
  }

  .element-row {
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) 24px;
    gap: 10px;
    align-items: center;
    color: var(--ink-2);
  }

  .bar {
    height: 8px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  .bar span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--accent));
  }

  .pillar-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .pillar {
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.035);
    padding: 16px;
    min-height: 170px;
  }

  .pillar-name {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--ink-3);
    font-size: 12px;
  }

  .pillar-chars {
    margin-top: 10px;
    font-family: var(--font-display);
    font-size: 44px;
    line-height: 1;
    letter-spacing: 0.08em;
  }

  .pillar-meta {
    margin-top: 12px;
    color: var(--ink-2);
    font-size: 13px;
  }

  .table-wrap {
    width: 100%;
    overflow-x: auto;
    border: 1px solid var(--rule);
  }

  .bazi-meta {
    display: grid;
    gap: 6px;
    margin-bottom: 14px;
    color: var(--ink-2);
    font-size: 14px;
  }

  .bazi-meta span {
    color: var(--ink-3);
  }

  .element-legend {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    margin: 14px 0;
  }

  .element-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 46px;
    padding: 8px 10px;
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.035);
    color: var(--ink-2);
    font-size: 12px;
  }

  .table-mark {
    display: inline-grid;
    place-items: center;
    min-width: 36px;
    min-height: 36px;
    padding: 0 8px;
    border: 1px solid currentColor;
    border-radius: 999px;
    font-family: var(--font-display);
    font-weight: 700;
    line-height: 1;
  }

  .element-mark,
  .bazi-icon,
  .guide-icon {
    display: inline-grid;
    place-items: center;
    flex: 0 0 auto;
    width: 28px;
    height: 28px;
    border: 1px solid currentColor;
    border-radius: 999px;
    font-family: var(--font-display);
    font-weight: 700;
    line-height: 1;
  }

  .bazi-board {
    width: 100%;
    overflow-x: auto;
    border: 1px solid var(--rule);
    background: rgba(239, 235, 226, 0.9);
    color: #414141;
  }

  .bazi-row {
    display: grid;
    grid-template-columns: 156px repeat(4, minmax(118px, 1fr));
    min-width: 760px;
    border-bottom: 1px solid rgba(40, 36, 28, 0.08);
  }

  .bazi-row:last-child {
    border-bottom: 0;
  }

  .bazi-head {
    background: rgba(225, 220, 209, 0.55);
    color: #313131;
    font-weight: 700;
  }

  .bazi-label,
  .bazi-cell {
    display: grid;
    align-content: center;
    justify-items: center;
    min-height: 48px;
    padding: 9px 10px;
    text-align: center;
  }

  .bazi-label {
    justify-items: start;
    padding-left: 16px;
    color: #515151;
  }

  .bazi-label-content {
    display: flex;
    align-items: center;
    gap: 9px;
    text-align: left;
  }

  .bazi-label-content strong,
  .bazi-head-label {
    display: block;
    color: #303030;
    font-size: 15px;
    line-height: 1.2;
  }

  .bazi-label-content small {
    display: block;
    max-width: 88px;
    margin-top: 3px;
    color: #817b70;
    font-size: 11px;
    line-height: 1.25;
  }

  .bazi-icon {
    width: 30px;
    height: 30px;
    background: rgba(255, 255, 255, 0.38);
    color: #8f7652;
    font-size: 13px;
  }

  .bazi-cell {
    border-left: 1px solid rgba(40, 36, 28, 0.05);
  }

  .bazi-cell.is-day {
    background: rgba(255, 255, 255, 0.22);
  }

  .bazi-god .bazi-cell {
    min-height: 44px;
    font-size: 15px;
  }

  .bazi-stem .bazi-cell,
  .bazi-branch .bazi-cell {
    min-height: 72px;
    font-family: var(--font-display);
    font-size: 48px;
    line-height: 1;
    font-weight: 700;
  }

  .bazi-detail .bazi-cell,
  .bazi-shensha .bazi-cell {
    min-height: 92px;
    gap: 4px;
    font-size: 15px;
    line-height: 1.35;
  }

  .bazi-flat .bazi-cell {
    min-height: 48px;
    font-size: 15px;
  }

  .chart-guide {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 14px;
  }

  .chart-guide article {
    display: grid;
    gap: 8px;
    align-content: start;
    min-height: 142px;
    padding: 14px;
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.035);
  }

  .chart-guide h3 {
    font-size: 15px;
    color: var(--ink);
  }

  .chart-guide p {
    color: var(--ink-2);
    font-size: 12px;
    line-height: 1.65;
  }

  .token-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .token {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 30px;
    padding: 0 10px;
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.03);
    color: var(--ink-2);
    font-size: 12px;
  }

  .token strong {
    color: var(--ink);
    font-weight: 600;
  }

  .token-subtle {
    color: var(--ink-3);
  }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 14px;
  }

  .theme-card {
    display: grid;
    gap: 10px;
    align-content: start;
    min-height: 204px;
    padding: 16px;
    border: 1px solid var(--rule);
    background: rgba(255, 255, 255, 0.035);
  }

  .theme-head {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .theme-head h3 {
    font-size: 18px;
    color: var(--ink);
  }

  .theme-meta {
    margin-top: 4px;
    color: var(--ink-3);
    font-size: 12px;
  }

  .theme-card p {
    color: var(--ink-2);
    font-size: 13px;
    line-height: 1.7;
  }

  .guide-icon {
    color: var(--gold);
  }

  .mini-line {
    display: block;
  }

  .wood {
    color: #26906b;
  }

  .fire {
    color: #d24f4a;
  }

  .earth {
    color: #8f7652;
  }

  .metal {
    color: #c39628;
  }

  .water {
    color: #2f80c8;
  }

  .neutral,
  .muted {
    color: #8d887e;
  }

  table {
    width: 100%;
    min-width: 860px;
    border-collapse: collapse;
  }

  th,
  td {
    padding: 11px 12px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    text-align: left;
    vertical-align: top;
  }

  th {
    color: var(--ink);
    background: rgba(255, 255, 255, 0.05);
    font-weight: 600;
    white-space: nowrap;
  }

  td {
    color: var(--ink-2);
  }

  tr:last-child td {
    border-bottom: 0;
  }

  th:last-child,
  td:last-child {
    border-right: 0;
  }

  .notice-list {
    display: grid;
    gap: 8px;
  }

  .notice {
    border-left: 3px solid var(--warn);
    padding: 8px 12px;
    background: rgba(213, 174, 113, 0.1);
    color: var(--ink-2);
  }

  .next-links {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .next-link {
    min-height: 96px;
    border: 1px solid var(--rule);
    padding: 16px;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.03);
  }

  .next-link span {
    display: block;
    margin-top: 6px;
    color: var(--ink-3);
    font-size: 12px;
  }

  .error {
    border: 1px solid rgba(162, 59, 48, 0.6);
    border-left: 4px solid var(--seal);
    padding: 16px;
    background: rgba(162, 59, 48, 0.1);
    color: #ffd6cc;
  }

  @keyframes rotateOracle {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes revealResult {
    from {
      opacity: 0;
      transform: translateY(14px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .casting-orbit,
    .results.is-entering .section {
      animation: none;
    }
  }

  @media (max-width: 980px) {
    .hero,
    .summary {
      grid-template-columns: 1fr;
    }

    .pillar-grid,
    .next-links,
    .chart-guide,
    .theme-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
